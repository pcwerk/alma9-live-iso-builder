# =============================================================================
# boot-config.conf - input for customize-boot.sh
# =============================================================================
# Key=value pairs. No spaces around '='. Lines beginning with '#' are ignored.
# Values may be quoted with double quotes; quotes are stripped at parse time.
# =============================================================================

# Plymouth theme name (must be installed or supplied via plymouth_custom_theme_dir).
# Common built-ins: bgrt, charge, spinner, fade-in, glow, script, solar, tribar
plymouth_theme=bgrt

# Optional directory containing a custom Plymouth theme to install into
# /usr/share/plymouth/themes/. Leave empty to skip.
plymouth_custom_theme_dir=

# GRUB menu timeout in seconds (0 hides the menu entirely)
grub_timeout=3

# Path to GRUB background image (PNG or TGA). Leave empty for no background.
grub_background=/usr/share/backgrounds/default.png

# Show kernel messages on the console during boot? (true|false)
show_kernel_messages=false

# Show a Plymouth progress bar during boot? (true|false)
show_progress_bar=true

# Splash resolution hint (e.g. 1920x1080). Empty = let GRUB auto-detect.
splash_resolution=1920x1080

# Pass 'quiet' on the kernel cmdline? (true|false)
boot_quiet=true
